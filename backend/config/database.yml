default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV['DB_USERNAME'] %>
  password: <%= ENV['DB_PASSWORD'] %>
  host: localhost

development:
  <<: *default
  database: job_portal_development

test:
  <<: *default
  database: job_portal_test

production:
  <<: *default
  database: job_portal_production
  username: job_portal
  password: <%= ENV['JOB_PORTAL_DATABASE_PASSWORD'] %>